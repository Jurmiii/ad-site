<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>14. 데이터 암호화 및 백업 · Money Calendar</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="../js/theme.js"></script>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/journal-shell.css" />
    <link rel="stylesheet" href="../js/excel-manager.css" />
    <link rel="stylesheet" href="./backup-security.css" />
  </head>
  <body class="mc-app" data-mc-feature-id="14">
    <script>
      window.__MC_ASSETS_BASE = "..";
    </script>
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>
    <header class="mc-global-header" role="banner">
      <div class="container mc-global-header__inner">
        <a class="mc-brand" href="../index.html">
          <span class="mc-brand__mark" aria-hidden="true">M</span>
          <span class="mc-brand__titles">
            <span class="mc-brand__series">Money Calendar</span>
            <span class="mc-brand__page">15. 데이터 암호화 및 백업</span>
          </span>
        </a>
        <div class="mc-global-header__tools">
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 전환" aria-pressed="false">
            <span class="theme-toggle__icon theme-toggle__sun" aria-hidden="true"></span>
            <span class="theme-toggle__thumb" aria-hidden="true"></span>
            <span class="theme-toggle__icon theme-toggle__moon" aria-hidden="true"></span>
          </button>
          <button
            class="mc-hamburger hamburger"
            type="button"
            aria-label="메뉴 열기"
            aria-controls="drawer"
            aria-expanded="false"
            id="drawer-open"
          >
            <span class="mc-hamburger__icon hamburger__icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </header>
    <div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="기능 메뉴" hidden>
      <div class="drawer__backdrop" data-drawer-close></div>
      <div class="drawer__panel" role="document">
        <div class="drawer__top">
          <p class="drawer__title">머니 캘린더</p>
          <button class="drawer__close" type="button" aria-label="메뉴 닫기" data-drawer-close>닫기</button>
        </div>
        <nav class="drawer__nav" id="mc-drawer-list" aria-label="기능 1~15"></nav>
        <div class="drawer__meta">
          <p class="text-sm">암호화 백업은 Web Crypto(AES-GCM)를 사용합니다. https 환경을 권장합니다.</p>
        </div>
      </div>
    </div>
    <div class="mc-app__canvas">
      <div class="container">
        <main id="main">
          <header class="mc-page-intro">
            <p class="mc-page-intro__kicker">14 · 데이터 암호화 및 백업</p>
            <h1>14. 데이터 암호화 및 백업</h1>
            <p class="mc-page-intro__lead text-body">
              전체 localStorage 스냅샷을 JSON으로 내려받거나, 비밀번호로 AES-GCM 암호화한 바이너리(.mcb)로 저장할 수
              있습니다. 복원 시 기존 키를 덮어쓰므로 주의하세요.
            </p>
          </header>
          <div id="excel-control-root" class="mc-excel-slot"></div>
          <section class="card mt-24">
            <h2 class="bk-h2">평문 백업</h2>
            <button id="btn-json" class="btn mt-16" type="button">JSON 전체 다운로드</button>
            <h2 class="bk-h2 mt-24">암호화 백업</h2>
            <label class="field mt-16">
              <span class="field-label">백업 비밀번호</span>
              <input id="bk-pass" type="password" autocomplete="new-password" placeholder="8자 이상 권장" />
            </label>
            <button id="btn-enc" class="btn mt-16" type="button">암호화 파일(.mcb) 저장</button>
            <h2 class="bk-h2 mt-24">복원</h2>
            <input id="bk-file" type="file" accept=".json,.mcb,application/json" class="mt-16" />
            <label class="field mt-16">
              <span class="field-label">복원 비밀번호 (.mcb 시)</span>
              <input id="bk-pass-in" type="password" autocomplete="new-password" />
            </label>
            <button id="btn-restore" class="btn-secondary mt-16" type="button">선택 파일에서 복원</button>
          </section>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="../js/nav-config.js"></script>
    <script src="../js/excel-manager.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="./backup-security.js"></script>
  </body>
</html>
