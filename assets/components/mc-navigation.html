  Navigation(즐겨찾기): 실제 DOM은 app-shell.js가 #mc-fav-bar(그리드)와 #mc-fav-dropdown(details)을 주입합니다.
  스타일: journal-shell.css (.mc-fav-bar, .mc-fav-dropdown)
-->
<!-- 데스크톱: 5칸 그리드 -->
<nav id="mc-fav-bar" class="mc-fav-bar" aria-label="즐겨찾기 바로가기"></nav>
<!-- 태블릿/모바일(1024px 이하): 드롭다운 -->
<details id="mc-fav-dropdown" class="mc-fav-dropdown" aria-label="즐겨찾기 바로가기"></details>
