<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>15. 공개형 공유 페이지 · Money Calendar</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script src="../js/theme.js"></script>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/journal-shell.css" />
    
    <link rel="stylesheet" href="./community.css" />
  </head>
  <body class="mc-app" data-mc-feature-id="15">
    <script>
      window.__MC_ASSETS_BASE = "..";
    </script>
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>
    <header class="mc-global-header" role="banner">
      <div class="container mc-global-header__inner">
        <a class="mc-brand" href="../index.html">
          <span class="mc-brand__mark" aria-hidden="true">M</span>
          <span class="mc-brand__titles">
            <span class="mc-brand__series">Money Calendar</span>
            <span class="mc-brand__page">14. 공개형 공유 페이지</span>
          </span>
        </a>
        <div class="mc-global-header__tools">
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 전환" aria-pressed="false">
            <span class="theme-toggle__icon theme-toggle__sun" aria-hidden="true"></span>
            <span class="theme-toggle__thumb" aria-hidden="true"></span>
            <span class="theme-toggle__icon theme-toggle__moon" aria-hidden="true"></span>
          </button>
          <button
            class="mc-hamburger hamburger"
            type="button"
            aria-label="메뉴 열기"
            aria-controls="drawer"
            aria-expanded="false"
            id="drawer-open"
          >
            <span class="mc-hamburger__icon hamburger__icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </header>
    <div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="기능 메뉴" hidden>
      <div class="drawer__backdrop" data-drawer-close></div>
      <div class="drawer__panel" role="document">
        <div class="drawer__top">
          <p class="drawer__title">머니 캘린더</p>
          <button class="drawer__close" type="button" aria-label="메뉴 닫기" data-drawer-close>닫기</button>
        </div>
        <nav class="drawer__nav" id="mc-drawer-list" aria-label="기능 1~15"></nav>
        <div class="drawer__meta">
          <p class="text-sm">게시물은 이 기기의 localStorage에만 저장됩니다.</p>
        </div>
      </div>
    </div>
    <div class="mc-app__canvas">
      <div class="container">
        <main id="main">
          <header class="mc-page-intro">
            <p class="mc-page-intro__kicker">15 · 공개형 공유 페이지</p>
            <h1>15. 공개형 공유 페이지</h1>
            <p class="mc-page-intro__lead text-body">
              익명 닉네임과 짧은 재정 습관·성공 노하우를 남깁니다. 서버 전송 없이 브라우저에만 보관되는 목업 게시판입니다.
            </p>
          </header>
          
          <section class="card mt-24">
            <h2 class="text-body" style="font-weight: 800">글쓰기</h2>
            <form id="co-form" class="co-form mt-16">
              <label class="field">
                <span class="field-label">닉네임 (익명)</span>
                <input id="co-nick" maxlength="24" required placeholder="예: 절약하는펭귄" />
              </label>
              <label class="field mt-16">
                <span class="field-label">내용</span>
                <textarea id="co-body" rows="4" maxlength="800" required placeholder="이번 달에 시도한 습관을 적어 주세요."></textarea>
              </label>
              <button class="btn mt-16" type="submit">등록</button>
            </form>
          </section>
          <section class="card mt-24">
            <h2 class="text-body" style="font-weight: 800">게시판</h2>
            <ul id="co-list" class="co-list mt-16"></ul>
          </section>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="../js/nav-config.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="./community.js"></script>
  </body>
</html>
